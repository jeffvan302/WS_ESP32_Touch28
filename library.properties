name=WS_ESP32_Touch28
version=1.0.2
author=jeffvan302
maintainer=jeffvan302
sentence=Hardware abstraction library for the Waveshare ESP32-S3 Touch 2.8" board.
paragraph=Provides drivers for the ST7789 240x320 LCD (PSRAM framebuffer with dirty-rect optimization and runtime rotation), CST328 capacitive touch with gesture recognition, PCM5101 I2S audio, SD_MMC card with image loading (JPG/PNG), QMI8658 6-axis IMU with orientation tracking, PCF85063 real-time clock with alarm support, battery monitoring with rolling average and percentage curve, and power management. Optional LVGL v9 integration compiles to zero overhead when LVGL is not installed.
category=Device Control
url=https://github.com/jeffvan302/WS_ESP32_Touch28
architectures=esp32
includes=WS_ESP32_Touch28.h
depends=JPEGDEC,PNGdec,ESP32-audioI2S-master
